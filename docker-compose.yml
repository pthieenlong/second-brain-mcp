services:
  postgres:
    image: postgres:16
    container_name: second-brain-db
    restart: unless-stopped
    environment: 
      POSTGRES_USER: brain
      POSTGRES_PASSWORD: brainpass
      POSTGRES_DB: second_brain
    ports: 
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: