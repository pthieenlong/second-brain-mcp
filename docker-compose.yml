services:
  postgres:
    image: postgres:16
    container_name: second-brain-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-brain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-brainpass}
      POSTGRES_DB: ${POSTGRES_DB:-second_brain}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: second-brain-mcp
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-brain}:${POSTGRES_PASSWORD:-brainpass}@postgres:5432/${POSTGRES_DB:-second_brain}?schema=public
      VAULT_PATH: /vault
      NOTE_CATEGORIES: ${NOTE_CATEGORIES:-}
    ports:
      - '${APP_PORT:-3000}:3000'
    volumes:
      - ${VAULT_PATH:?VAULT_PATH is required - copy .env.example to .env and set it}:/vault

volumes:
  pgdata: